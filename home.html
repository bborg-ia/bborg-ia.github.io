<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBORG Intelligence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1b1403 0%, #0a0a0a 45%, #000000 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(212,175,55,0.12);
      border-radius: 24px;
      padding: 40px 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .logo {
      width: 140px;
      margin-bottom: 18px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(255, 196, 0, 0.15);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #c7c7c7;
      font-size: 0.95rem;
      margin-bottom: 35px;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      margin-bottom: 18px;
      padding: 18px;
      border-radius: 16px;
      font-weight: bold;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .primary {
      background: linear-gradient(90deg, #d4af37, #f0d46b);
      color: #000;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.35);
    }

    .secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
    }

    .socials {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .socials a {
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .socials a:hover {
      opacity: 0.8;
    }

    .footer {
      margin-top: 30px;
      color: #8a8a8a;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo43.png" alt="BBORG Intelligence" class="logo">

    <h1>BBORG Intelligence</h1>
    <p class="subtitle">Inteligência Fiscal • Tecnologia • Automação</p>

    <a href="/IR26" class="btn primary">
      IRPF 2026 — Blindagem Fiscal
    </a>

    <a href="https://bira-soares0139.hotmart.host/" target="_blank" class="btn secondary">
      A Fábrica — Manus & Produtos Digitais
    </a>

    <div class="socials">
      <a href="https://instagram.com/bborg_io" target="_blank">Instagram</a>
      <a href="https://facebook.com" target="_blank">Facebook</a>
    </div>

    <div class="footer">
      © BBORG Intelligence
    </div>
  </div>
</body>
</html>
